name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

      - name: Build examples
        run: |
          swift build --product AXInspectorCLI
          swift build --product PermissionsDemo

      - name: Lint (swift-format)
        run: swift format lint --strict --recursive --configuration .swift-format Sources Tests Examples
